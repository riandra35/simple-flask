<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>CRUD Supabase Python</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-8">
    <div class="max-w-md mx-auto bg-white p-6 rounded shadow">
        <h2 class="text-xl font-bold mb-4">Daftar Tugas</h2>
        
        <!-- Input Form -->
        <div class="flex gap-2 mb-4">
            <input id="taskInput" type="text" class="border p-2 flex-grow" placeholder="Tambah tugas baru...">
            <button onclick="addTask()" class="bg-blue-500 text-white px-4 py-2 rounded">Tambah</button>
        </div>

        <!-- List -->
        <ul id="taskList" class="space-y-2"></ul>
    </div>

    <script>
        const API_URL = '/api/tasks';

        // READ: Ambil data
        async function fetchTasks() {
            const res = await fetch(API_URL);
            const tasks = await res.json();
            const list = document.getElementById('taskList');
            list.innerHTML = tasks.map(t => `
                <li class="flex justify-between border-b p-2">
                    ${t.name}
                    <button onclick="deleteTask(${t.id})" class="text-red-500">Hapus</button>
                </li>
            `).join('');
        }

        // CREATE: Tambah data
        async function addTask() {
            const name = document.getElementById('taskInput').value;
            await fetch(API_URL, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ name })
            });
            document.getElementById('taskInput').value = '';
            fetchTasks();
        }

        // DELETE: Hapus data
        async function deleteTask(id) {
            await fetch(`${API_URL}?id=${id}`, { method: 'DELETE' });
            fetchTasks();
        }

        fetchTasks();
    </script>
</body>
</html>
